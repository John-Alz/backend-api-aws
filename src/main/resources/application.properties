spring.application.name=usersapi

spring.datasource.url=jdbc:mysql://persons-db.c1a8a6yu6cd5.us-east-2.rds.amazonaws.com:3306/persons_db
spring.datasource.username=${USERNAME_DB}
spring.datasource.password=${PASSWORD_DB}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=update

# Expose all actuator endpoints over HTTP
management.endpoints.web.exposure.include=*

# Change actuator base path (optional)
management.endpoints.web.base-path=/actuator

# Enable health details
management.endpoint.health.show-details=always

# Example: change server port
server.port=8080

appdescription=API de usuarios del sistema
appversion=1.0.0

